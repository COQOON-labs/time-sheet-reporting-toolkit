<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Rounded background -->
  <rect x="4" y="4" width="120" height="120" rx="26" ry="26" fill="#1e1b4b"/>

  <!-- Clipboard body -->
  <rect x="30" y="26" width="68" height="84" rx="8" ry="8" fill="#f8fafc"/>

  <!-- Clipboard clip -->
  <rect x="50" y="18" width="28" height="16" rx="4" ry="4" fill="#7c3aed"/>
  <rect x="56" y="22" width="16" height="8" rx="2" ry="2" fill="#1e1b4b"/>

  <!-- Baseline -->
  <rect x="40" y="92" width="48" height="3" rx="1" ry="1" fill="#cbd5e1"/>

  <!-- Three ascending bars (chart) -->
  <rect x="42" y="78" width="10" height="14" rx="1.5" ry="1.5" fill="#a78bfa"/>
  <rect x="58" y="66" width="10" height="26" rx="1.5" ry="1.5" fill="#8b5cf6"/>
  <rect x="74" y="52" width="10" height="40" rx="1.5" ry="1.5" fill="#7c3aed"/>

  <!-- Small clock face hint top-left of sheet -->
  <circle cx="42" cy="46" r="8" fill="none" stroke="#7c3aed" stroke-width="2.5"/>
  <line x1="42" y1="46" x2="42" y2="40" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="46" x2="46" y2="48" stroke="#7c3aed" stroke-width="2" stroke-linecap="round"/>
</svg>
