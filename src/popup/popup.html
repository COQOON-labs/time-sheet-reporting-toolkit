<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Reporting for Personio</title>
    <style>
      body {
        font: 13px/1.4 system-ui, sans-serif;
        margin: 0; padding: 14px; width: 260px;
      }
      h1 { font-size: 14px; margin: 0 0 8px; }
      p { color: #4b5563; margin: 0 0 10px; }
      kbd {
        background: #ede9fe; color: #6d28d9; padding: 1px 5px; border-radius: 4px;
        font-family: ui-monospace, monospace;
      }
      a { color: #7c3aed; }
    </style>
  </head>
  <body>
    <h1>📊 Reporting for Personio</h1>
    <p>
      Open any Personio page (e.g. Attendance) and click the
      <kbd>📊 Reporting</kbd> button in the bottom-right corner to open
      the reporting panel.
    </p>
    <p>Captured requests are stored locally in your browser (IndexedDB).</p>
  </body>
</html>
